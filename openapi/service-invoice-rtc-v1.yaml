openapi: 3.0.1
info:
  title: API de Emissão de Nota Fiscal de Serviços Eletrônica (NFS-e) - RTC
  version: v3
  description: |
    ### Introdução
    API para envio de dados de RPS/DPS para emissão de NFS-e, alinhada com o padrão nacional e complementada com campos específicos do Web Service da Prefeitura de São Paulo (NF-e/NFS-e).

    ### Adequação de Leiaute

    Nesta adequação de leiaute, foram considerados os leiautes do **Ambiente Nacional**, **São Paulo e ABRASF**.

    > **Atenção**
    > _Sujeito a alterações mediante notas técnicas e processos de homologação._
servers:
  - url: https://api.nfe.io
    description: Para realizar testes no ambiente de homologação da prefeitura, é necessário entrar em contato com o suporte para que a empresa seja parametrizada com os dados necessários.
tags:
  - name: Nota Fiscal de Serviço (RTC)
    description: Operações relacionadas à Nota Fiscal Eletrônica de Serviço

