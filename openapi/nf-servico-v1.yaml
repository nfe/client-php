    post:
      tags:
        - ServiceInvoices
      summary: Emitir uma Nota Fiscal de Serviço (NFSE)
      description: Você precisará do APIKEY da Empresa
      operationId: ServiceInvoices_Post
      parameters:
        - name: company_id
          in: path
          description: ID da empresa
          required: true
          schema:
            type: string
      requestBody:
        description: Dados da nota fiscal de serviço
        required: true
        content:
          application/json:
            schema:
              description: Emissão de nota fiscal de serviço
              required:
                - cityServiceCode
                - description
                - servicesAmount
              type: object
              properties:
                borrower:
                  description: |
                    Tomador dos serviços.

                    **Opcional**: o grupo `borrower` pode ser omitido. Quando informado, aplicam-se validações condicionais aos seus campos:
                    - `name`: se informado, no máximo 115 caracteres;
                    - `federalTaxNumber`: se informado (diferente de zero), deve ser um CNPJ/CPF válido e coerente com o `type` (`NaturalPerson` → CPF; `LegalEntity` → CNPJ). Para tomador no exterior (`address.country` ≠ `BRA`), não é validado;
                    - `phoneNumber`: se informado, entre 7 e 20 dígitos;
                    - `address`: opcional, mas se um endereço **brasileiro** for parcialmente preenchido, passam a ser obrigatórios `postalCode`, `street`, `city.code` (código IBGE de 7 dígitos), `city.name` e `state` (UF de 2 letras), que devem ser consistentes entre si.
                  required: []
                  type: object
                  properties:
                    type:
                      description: |
                        Tipo do tomador dos serviços.
                        Valores possíveis:
                        - `Undefined`: Indefinido
                        - `NaturalPerson`: Pessoa Física (CPF)
                        - `LegalEntity`: Pessoa Jurídica (CNPJ)
                      enum:
                        - Undefined
                        - NaturalPerson
                        - LegalEntity
                      type: string
                    name:
                      description: Nome / Razão Social
                      type: string
                      maxLenght: 115
                    federalTaxNumber:
                      format: int64
                      description: CNPJ ou CPF
                      type: integer
                      maxLength: 14
                    municipalTaxNumber:
                      description: Inscrição Municipal para Pessoas Jurídicas
                      type: string
                      maxLength: 12
                    stateTaxNumber:
                      description: Inscrição Estadual (opcional, não se aplica a todos)
                      type: string
                      maxLength: 19
                    taxRegime:
                      description: |
                        Código de Regime Tributário (CRT) da empresa.
                        Valores possíveis:
                        - `Isento`: Isento de tributação
                        - `MicroempreendedorIndividual`: Microempreendedor Individual (MEI)
                        - `SimplesNacional`: Simples Nacional
                        - `LucroPresumido`: Lucro Presumido (Regime Normal)
                        - `LucroReal`: Lucro Real (Regime Normal)
                      enum:
                        - Isento
                        - MicroempreendedorIndividual
                        - SimplesNacional
                        - LucroPresumido
                        - LucroReal
                      type: string
                    caepf:
                      description: Cadastro de Atividade Econômica da Pessoa Física (CAEPF)
                      type: string
                      maxLength: 14
                    phoneNumber:
                      description: Telefone
                      type: string
                      minLength: 7
                      maxLenght: 20
                    email:
                      description: Email
                      type: string
                    noTaxIdReason:
                      description: |
                        Justificativa para ausência de NIF (Número de Identificação Fiscal).
                        Valores possíveis:
                        - `NotInformedOriginal`: Não informado na nota de origem
                        - `Exempted`: Dispensado do NIF
                        - `NotRequired`: Não exigência do NIF
                      enum:
                        - NotInformedOriginal
                        - Exempted
                        - NotRequired
                      type: string
                    address:
                      description: Endereço
                      required:
                        - country
                      type: object
                      properties:
                        country:
                          description: "Sigla do País (padrão ISO 3166-1 mais em http://bit.ly/1OgCkxd)\r\nExemplo: BRA, USD, ARG"
                          type: string
