        "201":
          description: Sucesso na criação da empresa
          content:
            application/json:
              schema:
                type: object
                properties:
                  notification:
                    type: object
                    properties:
                      id:
                        description: Identificação
                        type: string
                      channel:
                        description: Canal de Notificação
                        enum:
                          - None
                          - Email
                        type: string
                      filters:
                        description: Filtro de Evento
                        type: array
                        items:
                          type: string
                      status:
                        description: Status no sistema
                        enum:
                          - Active
                          - Inactive
                        type: string
                      createdOn:
                        format: date-time
                        description: Data de criação
                        type: string
                      modifiedOn:
                        format: date-time
                        description: Data da última modificação
                        type: string
        "400":
          description: Algum parametro informado não é válido
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorsResource"
        "401":
          description: API Key da conta não é valida
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorsResource"
        "409":
          description: Já existe uma empresa com o CNPJ informado
