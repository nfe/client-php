                          description: Percentual total aproximado dos tributos municipais (%) (pTotTribMun).
                          type: number
                          minimum: 0
                        amount:
                          format: double
                          description: Valor total aproximado dos tributos municipais (R$) (vTotTribMun).
                          type: number
                          minimum: 0
                    rate:
                      format: double
                      description: Percentual total aproximado dos tributos (%).
                      type: number
                      minimum: 0
                    amount:
                      format: double
                      description: Valor total aproximado dos tributos (R$).
                      type: number
                      minimum: 0
                ibsCbs:
                  description: |
                    Informações referentes ao IBS (Imposto sobre Bens e Serviços) e à CBS (Contribuição sobre Bens e Serviços), tributos introduzidos pela Reforma Tributária. (IBSCBS)

                    **Campos obrigatórios:** `classCode` e `operationIndicator`.
                  type: object
                  required: [classCode, operationIndicator]
                  properties:
                    purpose:
                      description: |
                        Finalidade da emissão da NFS-e (finNFe).
                        Valores possíveis:
                        - `regular`: Regular
                      enum: [regular]
                      default: regular
                      type: string
                    destinationIndicator:
                      description: |
                        Relação entre destinatário e comprador/tomador indicado na NFS-e (indDest). Quando `DifferentFromBuyer`, o grupo `recipient` torna-se obrigatório.
                        Valores possíveis:
                        - `SameAsBuyer`: O destinatário é o mesmo que o comprador/tomador
                        - `DifferentFromBuyer`: O destinatário é diferente do comprador/tomador
                      enum: [SameAsBuyer, DifferentFromBuyer]
                      default: SameAsBuyer
                      type: string
                    basis:
                      format: double
                      description: Base de cálculo antes de reduções para cálculo do tributo bruto (vBC).
                      type: number
                    reimbursedResuppliedAmount:
                      format: double
                      description: Montante relativo a reembolso/repasse/ressarcimento não integrante da BC (vReembRepasse).
                      type: number
                    ibscbsDeductionReductionAmount:
                      format: double
                      description: Valor monetário (R$) total relativo aos valores de dedução e redução da Base de Cálculo do IBS e da CBS (vCalcDedRedIBSCBS).
                      type: number
                    isDonation:
                      description: Indica se a operação é uma doação (indDoacao).
                      type: boolean
                      nullable: true
                    personalUse:
                      description: |
                        Indicador de uso ou consumo pessoal do adquirente (indFinal). Crucial para regras tributárias específicas, como a não geração de crédito de IBS/CBS para o tomador.
                      type: boolean
                      nullable: true
                    operationIndicator:
                      description: |
                        Código que define a natureza e o local de incidência do IBS/CBS (cIndOp). Determina onde o imposto é devido — município do imóvel, estabelecimento do fornecedor, endereço do adquirente, local do evento, etc.

                        A lista completa de valores pode ser consultada na Tabela de [operationIndicator](https://nfe.io/docs/documentacao/reforma-tributaria/conceitos-funcionais/documentacao-layout-nfse-rtc/#tabela-de-operationindicator).
