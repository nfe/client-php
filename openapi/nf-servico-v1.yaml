                    processNumber:
                      description: Número do processo (nProcesso).
                      type: string
                      maxLength: 30
                serviceAmountDetails:
                  description: 'Detalhes dos valores do serviço, incluindo encargos. (Versão 2.0 SP)'
                  type: object
                  properties:
                    initialChargedAmount:
                      format: double
                      description: Valor Inicial Cobrado (ValorInicialCobrado) — valor dos serviços antes de tributos, multa e juros.
                      type: number
                    finalChargedAmount:
                      format: double
                      description: Valor Final Cobrado (ValorFinalCobrado) — valor total cobrado pela prestação do serviço, incluindo todos os tributos.
                      type: number
                    fineAmount:
                      format: double
                      description: Valor da Multa (ValorMulta).
                      type: number
                    interestAmount:
                      format: double
                      description: Valor dos Juros (ValorJuros).
                      type: number
                additionalInformationGroup:
                  description: |
                    Estrutura para envio de informações adicionais em campos específicos (ART/RRT, pedido, etc). Quando `additionalInformation` (texto simples) é preenchido, seu conteúdo é automaticamente copiado para `additionalInformationGroup.otherInformation`.
                  type: object
                  properties:
                    responsibilityDocumentIdentifier:
                      description: 'Identificador do documento de responsabilidade técnica (ART, RRT, etc.).'
                      type: string
                    referencedDocument:
                      description: Documento de referência relacionado ao serviço prestado.
                      type: string
                    order:
                      description: Número do pedido/ordem de compra/ordem de serviço.
                      type: string
                    items:
                      description: Grupo de itens do pedido/ordem de compra/ordem de serviço.
                      type: array
                      items:
                        type: object
                        properties:
                          item:
                            description: Item do pedido/ordem de compra/ordem de serviço.
                            type: string
                    otherInformation:
                      description: Outras informações complementares.
                      type: string
                approximateTotals:
                  description: |
                    Totais aproximados dos tributos (Lei 12.741/2012) com detalhamento por esfera (totTrib). Granularidade maior que o campo `approximateTax`. Se ambos forem preenchidos, o sistema prioriza `approximateTotals`. Se nenhum for preenchido, o cálculo é realizado automaticamente e preenche o grupo `approximateTax`.
