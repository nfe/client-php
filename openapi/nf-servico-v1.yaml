                      type: string
                      maxLength: 60
                    exportRegistration:
                      description: Número do Registro de Exportação (RE) averbado.
                      type: string
                      maxLength: 60
                    mdicDelivery:
                      description: Indicador de envio da NFS-e ao MDIC.
                      type: boolean
                deduction:
                  description: |
                    Grupo de informações relativas aos valores para dedução/redução da base de cálculo do ISSQN (vDR). Aplicado SOMENTE à base de cálculo do ISSQN. Estrutura detalhada alinhada ao padrão da NFS-e Nacional. Quando preenchido, o sistema prioriza estes dados sobre o campo simples `deductionsAmount`. Apenas uma das opções (`rate`, `amount` ou `documents`) deve ser preenchida.
                  type: object
                  properties:
                    rate:
                      format: double
                      description: Percentual padrão de dedução/redução (pDR, %).
                      type: number
                    amount:
                      format: double
                      description: Valor monetário padrão de dedução/redução (vDR, R$).
                      type: number
                    documents:
                      description: Documentos que justificam cada item de dedução/redução (1..1000).
                      type: array
                      items:
                        type: object
                        required: [deductionType, issueDate, deductibleTotal, usedAmount]
                        properties:
                          nfseKey:
                            description: Chave de acesso da NFS-e nacional (50 dígitos).
                            type: string
                            pattern: '^[0-9]{50}$'
                          nfeKey:
                            description: Chave de acesso da NF-e de produto (44 dígitos).
                            type: string
                            pattern: '^[0-9]{44}$'
                          municipalNfse:
                            description: Referência a NFS-e municipal no padrão legado.
                            type: object
                            properties:
                              cityCode:
                                description: Código IBGE do município emissor.
                                type: string
                              number:
                                description: Número da NFS-e municipal.
                                type: string
                              verificationCode:
                                description: Código de verificação.
                                type: string
                          fiscalDocumentNumber:
                            description: Identificador de outro documento fiscal não eletrônico.
                            type: string
                          nonFiscalDocumentNumber:
                            description: 'Identificador de documento não fiscal (ex: nota de débito interna).'
                            type: string
                          deductionType:
                            description: |
                              Tipo da dedução/redução (tpDedRed).
                              Valores aceitos:
                              - `FoodAndBeverages` (1): Alimentação e bebidas/frigobar
                              - `Materials` (2): Materiais
                              - `ConsortiumPassThrough` (5): Repasse consorciado
                              - `HealthPlanPassThrough` (6): Repasse plano de saúde
                              - `Services` (7): Serviços
                              - `Subcontracting` (8): Subempreitada de mão de obra
                              - `Other` (99): Outras deduções — exige `otherDeductionDescription`
                            enum: [FoodAndBeverages, Materials, ConsortiumPassThrough, HealthPlanPassThrough, Services, Subcontracting, Other]
                            type: string
                          otherDeductionDescription:
                            description: Obrigatório quando `deductionType = Other`.
                            type: string
                            maxLength: 150
                          issueDate:
                            format: date
                            description: Data de emissão do documento de origem (AAAA-MM-DD).
                            type: string
                          deductibleTotal:
                            format: double
                            description: Valor total dedutível/redutível no documento de origem.
                            type: number
                          usedAmount:
                            format: double
                            description: Valor efetivamente utilizado como dedução nesta NFS-e (≤ `deductibleTotal`).
                            type: number
                          supplier:
                            description: Fornecedor do documento (mesma estrutura do `borrower`).
                            type: object
                            properties:
                              type:
                                description: Tipo do fornecedor
                                enum: [Undefined, NaturalPerson, LegalEntity]
                                type: string
                              name:
                                description: Nome / Razão Social
                                type: string
                                maxLength: 115
                              federalTaxNumber:
                                format: int64
                                description: CNPJ, CPF ou NIF
                                type: integer
                              municipalTaxNumber:
                                description: Inscrição Municipal
                                type: string
                                maxLength: 12
                              stateTaxNumber:
                                description: Inscrição Estadual (Opcional)
                                type: string
                                maxLength: 19
                              taxRegime:
                                description: Tipo do Regime Tributário
                                enum: [Isento, MicroempreendedorIndividual, SimplesNacional, LucroPresumido, LucroReal]
                                type: string
                              caepf:
                                description: Cadastro de Atividade Econômica da Pessoa Física (CAEPF)
                                type: string
                                maxLength: 14
                              phoneNumber:
                                description: Telefone
                                type: string
                              email:
                                description: Email
                                type: string
                              noTaxIdReason:
                                description: |
                                  Justificativa para ausência de NIF.
                                  Valores possíveis:
                                  - `NotInformedOriginal`: Não informado na nota de origem
                                  - `Exempted`: Dispensado do NIF
                                  - `NotRequired`: Não exigência do NIF
                                enum: [NotInformedOriginal, Exempted, NotRequired]
                                type: string
                              address:
                                description: Endereço
                                type: object
                                properties:
                                  country:
                                    description: 'Sigla do País (padrão ISO 3166-1). Exemplo: BRA, USA, ARG'
                                    type: string
                                  postalCode:
                                    description: 'CEP (Exemplo: 99999-999)'
                                    type: string
                                  street:
                                    description: Logradouro
                                    type: string
                                  number:
                                    description: 'Número (Exemplo: 185 ou S/N)'
                                    type: string
                                  additionalInformation:
                                    description: 'Complemento (Exemplo: BLC A; APT 10)'
                                    type: string
                                  district:
                                    description: Bairro
                                    type: string
                                  city:
                                    description: Cidade
                                    type: object
                                    properties:
                                      code:
                                        description: Código do IBGE
                                        type: string
                                      name:
                                        description: Nome
                                        type: string
                                  state:
                                    description: Estado/UF
                                    type: string
                benefit:
                  description: Benefício Municipal aplicado à base de cálculo do ISSQN (BM). Deve conter `id` e exatamente um entre `amount` ou `rate`.
                  type: object
                  required: [id]
                  properties:
                    id:
                      description: 'Identificador do benefício (nBM: IBGE[7] + tipo[2] + seq[5]).'
                      type: string
                      pattern: '^\d{14}$'
                    amount:
                      format: double
                      description: Redução da BC por valor (vRedBCBM, R$).
                      type: number
                    rate:
                      format: double
                      description: Redução da BC por percentual (pRedBCBM, %).
                      type: number
                suspension:
                  description: Suspensão da exigibilidade do ISSQN (exigSusp).
                  type: object
                  required: [reason, processNumber]
                  properties:
                    reason:
                      description: |
                        Motivo da suspensão (tpSusp).
                        Valores possíveis:
                        - `Judicial`: Exigibilidade Suspensa por Decisão Judicial
                        - `Administrative`: Exigibilidade Suspensa por Processo Administrativo
                      enum: [Judicial, Administrative]
