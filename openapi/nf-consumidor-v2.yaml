        - Consumer Invoices
      summary: Emitir uma Nota Fiscal de Consumidor Eletrônica (NFCE) informando um StateTaxId
      description: "### Informações adicionais\r\nUtilize esta requisição para enviar uma Nota Fiscal de Consumidor Eletrônica (NFCE) para fila de emissão, informando explicitamente qual Inscrição Estadual (StateTax) deve ser utilizada.\r\nUtilize este endpoint quando a empresa possui mais de uma Inscrição Estadual (StateTax) ativa, evitando a seleção automática da primeira IE cadastrada (paridade com a emissão de NF-e).\r\n**ATENÇÃO**: O processamento será feito de forma assíncrona, ou seja, o retorno positivo não garante a emissão do documento fiscal.\r\nPara obter um retorno ao final do processo de emissão de uma Nota Fiscal de Consumidor Eletrônica (NFCE), recomendamos utilizar os WebHooks."
      parameters:
        - name: companyId
          in: path
          description: Empresa ID
          required: true
          schema:
            type: string
        - name: statetaxId
          in: path
          description: Inscrição Estadual (StateTax) ID
          required: true
          schema:
            type: string
      requestBody:
        description: Dados da nota fiscal de Consumidor a ser emitida
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ConsumerInvoiceRequest'
          text/json:
            schema:
              $ref: '#/components/schemas/ConsumerInvoiceRequest'
          application/*+json:
            schema:
              $ref: '#/components/schemas/ConsumerInvoiceRequest'
      responses:
        "200":
          description: Sucesso ao enfileirar para emissão
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ConsumerInvoiceRequest'
        "400":
          description: Algum parâmetro informado não é válido, verificar resposta
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorsResource'
        "404":
          description: Inscrição Estadual (StateTax) informada não pertence à empresa ou empresa sem Inscrição Estadual configurada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorsResource'
