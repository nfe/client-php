                            street:
                              type: string
                              description: Logradouro do Endereço
                            number:
                              type: string
                              description: Número do Endereço. Usar S/N para "sem número".
                            postalCode:
                              type: string
                              description: Cód. Endereço Postal (CEP)
                            country:
                              type: string
