openapi: 3.0.0
info:
  version: v2
  title: Legal Entities API
  x-sidebarLabel: Introdução
  x-description: Teste
  description: <h2>Como utilizar esta documentação ?</h2><p>Certifique-se que sua
    chave da API está preenchida no topo desta página para este recurso
    funcionar da maneira correta. Abaixo você poderá conferir a lista de
    recursos que podem ser manipulados através da API. Clicando em cada um dos
    métodos, você poderá verificar a lista de parâmetros, possíveis retornos e
    também um formulário. Este formulário pode ser utilizado para efetuar
    requisições reais na API.</p>
paths:
  "/v2/legalentities/basicInfo/{federalTaxNumber}":
    get:
      tags:
        - LegalEntities
      summary: Consulta de dados do CNPJ
      description: Você precisará do APIKEY da Empresa
      operationId: V2LegalentitiesBasicInfoByFederalTaxNumberGet
      parameters:
        - name: federalTaxNumber
          in: path
          description: CNPJ
          required: true
          schema:
            type: integer
            format: int64
        - name: updateAddress
          in: query
          description: "Define se deseja ou não atualizar o endereço do cartão CNPJ com
            base nos correios (Default: true)"
          required: false
          schema:
            type: boolean
        - name: updateCityCode
          in: query
          description: "Quando updateAddress=false, define se deseja ou não atualizar
            somente o código da cidade utilizando o código postal com base nos
            correios (Default: false)"
          required: false
          schema:
            type: boolean
      responses:
        "200":
          description: Sucesso na requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataTech.Api.Resources.LegalEntities.LegalPersonRes\
                  ourceV2"
        "400":
          description: Algum parametro informado não é válido
          content:
            application/json:
              schema:
                type: string
        "401":
          description: Não autorizado, verificar o cabeçalho do HTTP Authorization
        "403":
          description: Accesso proibido
        "404":
          description: Empresa não encontrada para o CNPJ informado
          content:
            application/json:
              schema:
                type: string
        "500":
          description: Erro no processamento
          content:
            application/json:
              schema:
                type: string
      security:
        - Authorization_Header:
            - CheckClaimOrRole
        - Authorization_QueryParam:
            - CheckClaimOrRole
  "/v2/legalentities/stateTaxInfo/{state}/{federalTaxNumber}":
    get:
      tags:
