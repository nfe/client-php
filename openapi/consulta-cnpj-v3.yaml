              - SC
              - SE
              - SP
              - TO
              - EX
              - NA
        - name: federalTaxNumber
          in: path
          description: Número do documento que deseja consultar
          required: true
          schema:
            type: integer
            format: int64
      responses:
        "200":
          description: Sucesso na requisição
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DataTech.Api.Resources.LegalEntities.StateTaxResour\
                  ceV2"
        "400":
